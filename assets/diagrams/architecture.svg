<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="system-ui,-apple-system,sans-serif">
  <defs>
    <!-- Animated pulse -->
    <style>
      @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }
      @keyframes flowRight { 0%{offset-distance:0%} 100%{offset-distance:100%} }
      @keyframes flowLeft { 0%{offset-distance:100%} 100%{offset-distance:0%} }
      @keyframes glow { 0%,100%{filter:drop-shadow(0 0 3px #00e5ff)} 50%{filter:drop-shadow(0 0 8px #00e5ff)} }
      .pulse { animation: pulse 2s ease-in-out infinite }
      .glow { animation: glow 3s ease-in-out infinite }
      .label { font-size: 11px; fill: #94a3b8; font-weight: 500 }
      .title { font-size: 13px; fill: #e2e8f0; font-weight: 700 }
      .subtitle { font-size: 10px; fill: #64748b }
      .badge { font-size: 9px; font-weight: 600 }
    </style>
    <!-- Gradient backgrounds -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="consumerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity=".15"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity=".03"/>
    </linearGradient>
    <linearGradient id="cloudGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity=".2"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity=".05"/>
    </linearGradient>
    <linearGradient id="providerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity=".15"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity=".03"/>
    </linearGradient>
    <linearGradient id="arrowCyan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="arrowAmber" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <!-- Flow dot paths -->
    <path id="pathConsumer1" d="M200,130 C300,130 320,200 370,200" fill="none"/>
    <path id="pathConsumer2" d="M200,230 C300,230 320,240 370,240" fill="none"/>
    <path id="pathConsumer3" d="M200,330 C300,330 320,280 370,280" fill="none"/>
    <path id="pathConsumer4" d="M200,420 C300,420 320,310 370,310" fill="none"/>
    <path id="pathProvider1" d="M700,150 C620,150 600,220 530,220" fill="none"/>
    <path id="pathProvider2" d="M700,270 C620,270 600,260 530,260" fill="none"/>
    <path id="pathProvider3" d="M700,390 C620,390 600,300 530,300" fill="none"/>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" rx="12" fill="url(#bgGrad)"/>
  <rect x="1" y="1" width="898" height="518" rx="11" fill="none" stroke="#1e293b" stroke-width="1"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="16" fill="#e2e8f0" font-weight="800">OllaBridge Cloud Architecture</text>
  <text x="450" y="52" text-anchor="middle" font-size="11" fill="#64748b">Consumer Clients  &lt;--  Gateway  --&gt;  Provider Sources</text>

  <!-- === LEFT: CONSUMER CLIENTS === -->
  <rect x="20" y="75" width="195" height="410" rx="10" fill="url(#consumerGrad)" stroke="#06b6d4" stroke-opacity=".3" stroke-width="1"/>
  <text x="117" y="98" text-anchor="middle" font-size="12" fill="#22d3ee" font-weight="700">CONSUMERS</text>
  <text x="117" y="112" text-anchor="middle" class="subtitle">Apps that use the API</text>

  <!-- GitPilot -->
  <rect x="35" y="122" width="165" height="44" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <circle cx="52" cy="144" r="11" fill="#ff7a3c" opacity=".2"/><text x="52" y="148" text-anchor="middle" font-size="12">&#x1F916;</text>
  <text x="70" y="140" class="title">GitPilot</text>
  <text x="70" y="153" class="subtitle">AI Code Assistant</text>

  <!-- 3D Avatar / Quest -->
  <rect x="35" y="176" width="165" height="44" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <circle cx="52" cy="198" r="11" fill="#8b5cf6" opacity=".2"/><text x="52" y="202" text-anchor="middle" font-size="12">&#x1F3AE;</text>
  <text x="70" y="194" class="title">3D Avatar Chat</text>
  <text x="70" y="207" class="subtitle">Meta Quest VR</text>

  <!-- RepoGuardian -->
  <rect x="35" y="230" width="165" height="44" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <circle cx="52" cy="252" r="11" fill="#14b8a6" opacity=".2"/><text x="52" y="256" text-anchor="middle" font-size="12">&#x1F6E1;</text>
  <text x="70" y="248" class="title">RepoGuardian</text>
  <text x="70" y="261" class="subtitle">Repo Health Monitor</text>

  <!-- Web / Mobile Apps -->
  <rect x="35" y="284" width="165" height="44" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <circle cx="52" cy="306" r="11" fill="#f59e0b" opacity=".2"/><text x="52" y="310" text-anchor="middle" font-size="12">&#x1F4F1;</text>
  <text x="70" y="302" class="title">Web / Mobile</text>
  <text x="70" y="315" class="subtitle">Any HTTP client</text>

  <!-- OpenAI SDK -->
  <rect x="35" y="338" width="165" height="44" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <circle cx="52" cy="360" r="11" fill="#3b82f6" opacity=".2"/><text x="52" y="364" text-anchor="middle" font-size="12">&#x1F4E6;</text>
  <text x="70" y="356" class="title">OpenAI SDK</text>
  <text x="70" y="369" class="subtitle">Python / Node.js</text>

  <!-- Protocol badge -->
  <rect x="55" y="395" width="125" height="22" rx="11" fill="#06b6d4" fill-opacity=".1" stroke="#06b6d4" stroke-opacity=".3"/>
  <text x="117" y="410" text-anchor="middle" class="badge" fill="#22d3ee">POST /v1/chat/completions</text>

  <rect x="55" y="422" width="125" height="22" rx="11" fill="#06b6d4" fill-opacity=".1" stroke="#06b6d4" stroke-opacity=".3"/>
  <text x="117" y="437" text-anchor="middle" class="badge" fill="#22d3ee">GET /v1/models</text>

  <!-- === CENTER: OLLABRIDGE CLOUD === -->
  <rect x="260" y="75" width="380" height="410" rx="10" fill="url(#cloudGrad)" stroke="#8b5cf6" stroke-opacity=".3" stroke-width="1"/>
  <text x="450" y="98" text-anchor="middle" font-size="14" fill="#c4b5fd" font-weight="800">OLLABRIDGE CLOUD</text>
  <text x="450" y="114" text-anchor="middle" class="subtitle">Enterprise AI Gateway</text>

  <!-- Gateway box -->
  <rect x="340" y="130" width="220" height="130" rx="8" fill="#0f172a" stroke="#6d28d9" stroke-opacity=".4" stroke-width="1" class="glow"/>
  <text x="450" y="152" text-anchor="middle" font-size="12" fill="#a78bfa" font-weight="700">Smart Router</text>

  <text x="355" y="175" class="label">1.</text><text x="368" y="175" font-size="10" fill="#22d3ee">HomePilot Direct</text>
  <text x="355" y="192" class="label">2.</text><text x="368" y="192" font-size="10" fill="#fbbf24">WebSocket Relay</text>
  <text x="355" y="209" class="label">3.</text><text x="368" y="209" font-size="10" fill="#a78bfa">Federation Peer</text>
  <text x="355" y="226" class="label">4.</text><text x="368" y="226" font-size="10" fill="#94a3b8">Local Ollama</text>

  <!-- Relay Hub -->
  <rect x="290" y="275" width="140" height="55" rx="8" fill="#0f172a" stroke="#334155"/>
  <text x="360" y="298" text-anchor="middle" font-size="11" fill="#fbbf24" font-weight="600">Relay Hub</text>
  <text x="360" y="313" text-anchor="middle" class="subtitle">WebSocket Registry</text>

  <!-- Federation -->
  <rect x="445" y="275" width="140" height="55" rx="8" fill="#0f172a" stroke="#334155"/>
  <text x="515" y="298" text-anchor="middle" font-size="11" fill="#a78bfa" font-weight="600">Federation Ring</text>
  <text x="515" y="313" text-anchor="middle" class="subtitle">Peer Mesh</text>

  <!-- Pairing -->
  <rect x="290" y="345" width="140" height="50" rx="8" fill="#0f172a" stroke="#334155"/>
  <text x="360" y="366" text-anchor="middle" font-size="11" fill="#ec4899" font-weight="600">Device Pairing</text>
  <text x="360" y="380" text-anchor="middle" class="subtitle">ABCD-1234 codes</text>

  <!-- Auth -->
  <rect x="445" y="345" width="140" height="50" rx="8" fill="#0f172a" stroke="#334155"/>
  <text x="515" y="366" text-anchor="middle" font-size="11" fill="#14b8a6" font-weight="600">Auth &amp; Security</text>
  <text x="515" y="380" text-anchor="middle" class="subtitle">HMAC + OAuth</text>

  <!-- DB -->
  <rect x="370" y="408" width="160" height="40" rx="8" fill="#0f172a" stroke="#334155"/>
  <text x="450" y="428" text-anchor="middle" font-size="11" fill="#94a3b8" font-weight="600">PostgreSQL / SQLite</text>
  <text x="450" y="441" text-anchor="middle" class="subtitle">Users, Devices, Sessions</text>

  <!-- Status badges -->
  <circle cx="285" y="465" r="4" fill="#22c55e" class="pulse"/><text x="295" y="469" font-size="9" fill="#4ade80">Online</text>
  <text x="340" y="469" font-size="9" fill="#64748b">Port 7860 (HF) / 8000 (local)</text>

  <!-- === RIGHT: PROVIDER SOURCES === -->
  <rect x="685" y="75" width="195" height="410" rx="10" fill="url(#providerGrad)" stroke="#f59e0b" stroke-opacity=".3" stroke-width="1"/>
  <text x="782" y="98" text-anchor="middle" font-size="12" fill="#fbbf24" font-weight="700">PROVIDERS</text>
  <text x="782" y="112" text-anchor="middle" class="subtitle">GPU sources that serve models</text>

  <!-- Local PC -->
  <rect x="700" y="125" width="165" height="50" rx="8" fill="#0f172a" stroke="#334155"/>
  <circle cx="717" cy="150" r="11" fill="#f59e0b" opacity=".2"/><text x="717" y="154" text-anchor="middle" font-size="12">&#x1F4BB;</text>
  <text x="735" y="145" class="title">Your PC</text>
  <text x="735" y="158" class="subtitle">Ollama + HomePilot</text>

  <!-- Colab GPU -->
  <rect x="700" y="185" width="165" height="50" rx="8" fill="#0f172a" stroke="#334155"/>
  <circle cx="717" cy="210" r="11" fill="#f59e0b" opacity=".2"/><text x="717" y="214" text-anchor="middle" font-size="12">&#x1F680;</text>
  <text x="735" y="205" class="title">Google Colab</text>
  <text x="735" y="218" class="subtitle">Free T4 / A100 GPU</text>

  <!-- Kaggle -->
  <rect x="700" y="245" width="165" height="50" rx="8" fill="#0f172a" stroke="#334155"/>
  <circle cx="717" cy="270" r="11" fill="#f59e0b" opacity=".2"/><text x="717" y="274" text-anchor="middle" font-size="12">&#x1F4CA;</text>
  <text x="735" y="265" class="title">Kaggle Notebook</text>
  <text x="735" y="278" class="subtitle">P100 / T4 GPU</text>

  <!-- Remote Server -->
  <rect x="700" y="305" width="165" height="50" rx="8" fill="#0f172a" stroke="#334155"/>
  <circle cx="717" cy="330" r="11" fill="#f59e0b" opacity=".2"/><text x="717" y="334" text-anchor="middle" font-size="12">&#x2601;</text>
  <text x="735" y="325" class="title">Cloud Server</text>
  <text x="735" y="338" class="subtitle">AWS / GCP / Azure</text>

  <!-- Local Ollama -->
  <rect x="700" y="365" width="165" height="50" rx="8" fill="#0f172a" stroke="#334155"/>
  <circle cx="717" cy="390" r="11" fill="#f59e0b" opacity=".2"/><text x="717" y="394" text-anchor="middle" font-size="12">&#x1F999;</text>
  <text x="735" y="385" class="title">Local Ollama</text>
  <text x="735" y="398" class="subtitle">Built-in (qwen2.5:1.5b)</text>

  <!-- Protocol badge -->
  <rect x="720" y="425" width="125" height="22" rx="11" fill="#f59e0b" fill-opacity=".1" stroke="#f59e0b" stroke-opacity=".3"/>
  <text x="782" y="440" text-anchor="middle" class="badge" fill="#fbbf24">WS /relay/connect</text>

  <rect x="720" y="452" width="125" height="22" rx="11" fill="#f59e0b" fill-opacity=".1" stroke="#f59e0b" stroke-opacity=".3"/>
  <text x="782" y="467" text-anchor="middle" class="badge" fill="#fbbf24">Outbound only</text>

  <!-- === FLOW ARROWS: Consumer -> Cloud === -->
  <line x1="215" y1="145" x2="335" y2="170" stroke="url(#arrowCyan)" stroke-width="1.5" stroke-dasharray="4,3" opacity=".5"/>
  <line x1="215" y1="200" x2="335" y2="190" stroke="url(#arrowCyan)" stroke-width="1.5" stroke-dasharray="4,3" opacity=".5"/>
  <line x1="215" y1="255" x2="335" y2="200" stroke="url(#arrowCyan)" stroke-width="1.5" stroke-dasharray="4,3" opacity=".5"/>
  <line x1="215" y1="308" x2="335" y2="210" stroke="url(#arrowCyan)" stroke-width="1.5" stroke-dasharray="4,3" opacity=".5"/>
  <line x1="215" y1="362" x2="335" y2="220" stroke="url(#arrowCyan)" stroke-width="1.5" stroke-dasharray="4,3" opacity=".5"/>

  <!-- === FLOW ARROWS: Cloud -> Provider === -->
  <line x1="565" y1="170" x2="695" y2="150" stroke="url(#arrowAmber)" stroke-width="1.5" stroke-dasharray="4,3" opacity=".5"/>
  <line x1="565" y1="190" x2="695" y2="210" stroke="url(#arrowAmber)" stroke-width="1.5" stroke-dasharray="4,3" opacity=".5"/>
  <line x1="565" y1="200" x2="695" y2="270" stroke="url(#arrowAmber)" stroke-width="1.5" stroke-dasharray="4,3" opacity=".5"/>
  <line x1="565" y1="210" x2="695" y2="330" stroke="url(#arrowAmber)" stroke-width="1.5" stroke-dasharray="4,3" opacity=".5"/>

  <!-- Animated flow dots: consumer -> cloud -->
  <circle r="3" fill="#22d3ee">
    <animateMotion dur="3s" repeatCount="indefinite" path="M215,145 C275,145 295,170 335,170"/>
  </circle>
  <circle r="3" fill="#22d3ee">
    <animateMotion dur="3.5s" repeatCount="indefinite" path="M215,200 C275,200 295,190 335,190" begin="0.5s"/>
  </circle>
  <circle r="3" fill="#22d3ee">
    <animateMotion dur="2.8s" repeatCount="indefinite" path="M215,255 C275,255 295,200 335,200" begin="1s"/>
  </circle>

  <!-- Animated flow dots: cloud -> provider -->
  <circle r="3" fill="#fbbf24">
    <animateMotion dur="2.5s" repeatCount="indefinite" path="M565,170 C615,170 655,150 695,150"/>
  </circle>
  <circle r="3" fill="#fbbf24">
    <animateMotion dur="3s" repeatCount="indefinite" path="M565,190 C615,190 655,210 695,210" begin="0.7s"/>
  </circle>
  <circle r="3" fill="#fbbf24">
    <animateMotion dur="3.2s" repeatCount="indefinite" path="M565,200 C615,200 655,270 695,270" begin="1.2s"/>
  </circle>

  <!-- Legend -->
  <rect x="20" y="495" width="860" height="2" rx="1" fill="#1e293b"/>
  <circle cx="40" cy="510" r="4" fill="#22d3ee"/><text x="50" y="514" font-size="9" fill="#94a3b8">API Request (HTTP)</text>
  <circle cx="200" cy="510" r="4" fill="#fbbf24"/><text x="210" y="514" font-size="9" fill="#94a3b8">Relay (WebSocket)</text>
  <circle cx="370" cy="510" r="4" fill="#a78bfa"/><text x="380" y="514" font-size="9" fill="#94a3b8">Federation (HMAC)</text>
  <circle cx="540" cy="510" r="4" fill="#22c55e" class="pulse"/><text x="550" y="514" font-size="9" fill="#94a3b8">No port forwarding needed</text>
  <text x="880" y="514" text-anchor="end" font-size="8" fill="#475569">ollabridge.com</text>
</svg>
