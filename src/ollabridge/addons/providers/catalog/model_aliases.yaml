# ─────────────────────────────────────────────────────────────
# OllaBridge — Model Alias Mapping
# ─────────────────────────────────────────────────────────────
# Aliases let clients request a logical model name (e.g. "ollabridge:auto")
# and the router resolves it to a concrete provider + model pair.
#
# The router tries candidates in order; if the first provider is
# unhealthy or over quota, it falls through to the next.
#
# Architecture principle: intent over names.
#   - ollabridge:*  — STABLE intent aliases. Users should code against these.
#   - hf:*          — convenience aliases for HF Inference Providers.
#   - free-*, etc.  — legacy aliases kept for backwards compatibility.
#
# Anything below the `# --- BEGIN AUTOMANAGED hf_catalog ---` sentinel
# is rewritten on every Hugging Face catalog sync. Manually-edited
# aliases above that sentinel are preserved across syncs.
# ─────────────────────────────────────────────────────────────

aliases:

  # ─────────────────────────────────────────────────────────
  # ollabridge:* — primary, intent-based aliases
  # These are the recommended names for client SDKs.
  # ─────────────────────────────────────────────────────────

  ollabridge:auto:
    # Best route overall. Tries local first (privacy + speed), then
    # OllaBridge's curated HF route, then a direct free cloud provider.
    - provider: ollama-node-01
      model: qwen2.5:14b
    - provider: huggingface-free
      model: meta-llama/Llama-3.3-70B-Instruct
    - provider: gemini-free
      model: gemini-2.5-flash

  ollabridge:free:
    # No-paid-usage routes only. Driven by HF free-credit + free direct APIs.
    - provider: huggingface-free
      model: meta-llama/Llama-3.3-70B-Instruct
    - provider: groq-free
      model: llama-3.3-70b-versatile
    - provider: gemini-free
      model: gemini-2.5-flash

  ollabridge:private:
    # Local / on-prem only. Never touches an external provider.
    - provider: ollama-node-01
      model: qwen2.5:14b
    - provider: ollama-node-02
      model: llama3.1:8b

  # ─────────────────────────────────────────────────────────
  # Legacy aliases — kept for backwards compatibility.
  # New code should prefer the ollabridge:* names above.
  # ─────────────────────────────────────────────────────────

  free-best:
    - provider: gemini-free
      model: gemini-2.5-flash
    - provider: groq-free
      model: llama-3.3-70b-versatile
    - provider: openrouter-free
      model: google/gemma-3-27b-it:free

  free-fast:
    - provider: groq-free
      model: llama-3.3-70b-versatile
    - provider: gemini-free
      model: gemini-2.5-flash

  free-flex:
    - provider: openrouter-free
      model: meta-llama/llama-3.3-70b-instruct:free
    - provider: huggingface-free
      model: meta-llama/Llama-3.1-8B-Instruct

  cheap-reasoning:
    - provider: deepseek-cheap
      model: deepseek-chat
    - provider: openrouter-free
      model: deepseek/deepseek-chat:free

  local-private:
    - provider: ollama-node-01
      model: qwen2.5:14b
    - provider: ollama-node-02
      model: llama3.1:8b

  # --- BEGIN AUTOMANAGED hf_catalog ---
  # Everything between BEGIN/END is regenerated by the HF catalog sync.
  # Do not edit by hand — your changes will be overwritten. To customise,
  # add your aliases ABOVE the BEGIN sentinel.
  #
  # Seeded fallbacks below cover the first boot before sync has run.

  # Lowest-latency live chat route
  ollabridge:fast:
    - provider: huggingface-free
      model: meta-llama/Llama-3.1-8B-Instruct:groq
    - provider: groq-free
      model: llama-3.3-70b-versatile

  # Best reasoning / thinking model
  ollabridge:reasoning:
    - provider: huggingface-free
      model: deepseek-ai/DeepSeek-R1
    - provider: huggingface-free
      model: Qwen/QwQ-32B-Preview

  # Best image-understanding model
  ollabridge:vision:
    - provider: huggingface-free
      model: Qwen/Qwen2.5-VL-72B-Instruct
    - provider: huggingface-free
      model: meta-llama/Llama-3.2-11B-Vision-Instruct

  # Best tool-calling model
  ollabridge:tools:
    - provider: huggingface-free
      model: meta-llama/Llama-3.3-70B-Instruct
    - provider: huggingface-free
      model: Qwen/Qwen2.5-72B-Instruct

  # Best structured-output (JSON / response_format) model
  ollabridge:json:
    - provider: huggingface-free
      model: meta-llama/Llama-3.3-70B-Instruct
    - provider: huggingface-free
      model: Qwen/Qwen2.5-72B-Instruct

  # Best image-generation model
  ollabridge:image:
    - provider: huggingface-free
      model: black-forest-labs/FLUX.1-Krea-dev

  # Best video-generation model
  ollabridge:video:
    - provider: huggingface-free
      model: tencent/HunyuanVideo

  # hf:* convenience aliases
  hf:best:
    - provider: huggingface-free
      model: deepseek-ai/DeepSeek-V3
    - provider: huggingface-free
      model: Qwen/Qwen2.5-72B-Instruct
    - provider: huggingface-free
      model: meta-llama/Llama-3.3-70B-Instruct

  hf:auto:
    - provider: huggingface-free
      model: meta-llama/Llama-3.3-70B-Instruct
    - provider: huggingface-free
      model: deepseek-ai/DeepSeek-V3
    - provider: huggingface-free
      model: Qwen/Qwen2.5-72B-Instruct

  hf:fast:
    - provider: huggingface-free
      model: meta-llama/Llama-3.1-8B-Instruct:groq

  hf:cheap:
    - provider: huggingface-free
      model: meta-llama/Llama-3.1-8B-Instruct
    - provider: huggingface-free
      model: Qwen/Qwen2.5-7B-Instruct

  hf:tools:
    - provider: huggingface-free
      model: meta-llama/Llama-3.3-70B-Instruct
    - provider: huggingface-free
      model: Qwen/Qwen2.5-72B-Instruct

  hf:vision:
    - provider: huggingface-free
      model: Qwen/Qwen2.5-VL-72B-Instruct

  hf:image:
    - provider: huggingface-free
      model: black-forest-labs/FLUX.1-Krea-dev

  hf:video:
    - provider: huggingface-free
      model: tencent/HunyuanVideo

  hf:deepseek:
    - provider: huggingface-free
      model: deepseek-ai/DeepSeek-V3
    - provider: huggingface-free
      model: deepseek-ai/DeepSeek-R1

  # --- END AUTOMANAGED hf_catalog ---
